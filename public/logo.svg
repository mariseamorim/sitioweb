<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 188 56" width="188" height="56">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark ── -->
  <g transform="translate(4,4)">

    <!-- Background rounded square -->
    <rect width="48" height="48" rx="13" fill="url(#iconBg)"/>

    <!-- Chimney -->
    <rect x="31" y="11" width="5" height="11" rx="1.5" fill="white"/>

    <!-- Roof -->
    <polygon points="24,7 43,27 5,27" fill="white"/>

    <!-- Walls -->
    <rect x="8" y="26" width="32" height="16" fill="white"/>

    <!-- Door -->
    <rect x="20" y="31" width="8" height="11" rx="3.5" fill="#16a34a"/>

    <!-- Left window -->
    <rect x="11" y="29" width="6" height="5" rx="1.5" fill="#dcfce7"/>

    <!-- Right window -->
    <rect x="31" y="29" width="6" height="5" rx="1.5" fill="#dcfce7"/>

    <!-- Ground line / grass -->
    <rect x="4" y="42" width="40" height="3" rx="1.5" fill="white" opacity="0.35"/>

  </g>

  <!-- ── Wordmark ── -->
  <text
    x="64" y="30"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="22"
    fill="#14532d"
  >Sítio</text>

  <text
    x="120" y="30"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="300"
    font-size="22"
    fill="#16a34a"
  >Web</text>

  <text
    x="65" y="45"
    font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="8.5"
    fill="#9ca3af"
    letter-spacing="2.2"
  >CONTROLE RURAL</text>

</svg>
